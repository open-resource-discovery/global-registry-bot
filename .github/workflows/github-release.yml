name: 'GitHub Release'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the release (e.g. 1.2.3)'
        required: false
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: open-resource-discovery/github-release@6829ef156fabd1264400500e6fa19d7c10593541 # main
        with:
          tag-template: 'rel/<version>'
          version: ${{ inputs.version }}
