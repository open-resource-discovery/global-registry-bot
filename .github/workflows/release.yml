name: Release

on:
  workflow_dispatch:
    inputs:
      docker:
        description: 'Build and push Docker image to GHCR'
        required: false
        type: boolean
        default: true

jobs:
  docker:
    if: inputs.docker
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (for version read)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compute tags
        id: meta
        run: |
          VERSION=$(node -p -e "require('./package.json').version")
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Error: package.json version '$VERSION' is not a valid semantic version." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "repository=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.meta.outputs.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.repository }}:latest
